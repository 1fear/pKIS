name: Build Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) {
            $tag = "${{ inputs.tag }}"
          }
          if (-not $tag) {
            throw "Release tag is required"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build legacy onefile transition app
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --windowed --name TakSklad --icon assets\TakSklad.ico --distpath dist\transition main.py

      - name: Compute transition exe SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\transition\TakSklad.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath dist\TakSklad.exe.sha256.txt -Encoding ascii -NoNewline
          "TAKSKLAD_EXE_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Build onedir app
        shell: pwsh
        run: |
          pyinstaller --clean --onedir --windowed --name TakSklad --icon assets\TakSklad.ico --distpath dist\onedir main.py
          Copy-Item README.txt dist\onedir\TakSklad\README.txt -Force

      - name: Package onedir app
        shell: pwsh
        run: |
          $zipPath = "dist\TakSklad-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path dist\onedir\TakSklad -DestinationPath $zipPath -CompressionLevel Optimal
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath "$zipPath.sha256.txt" -Encoding ascii -NoNewline
          "TAKSKLAD_ZIP_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" dist\TakSklad-windows-x64.zip dist\TakSklad-windows-x64.zip.sha256.txt dist\transition\TakSklad.exe dist\TakSklad.exe.sha256.txt --clobber
